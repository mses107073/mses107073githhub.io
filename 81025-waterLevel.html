<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>APCS 裝飲料水位模擬器</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f0f8ff; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        .input-group { margin-bottom: 10px; }
        label { display: inline-block; width: 120px; }
        input { padding: 5px; width: 60px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        
        /* 杯子視覺化 */
        #cup-container { margin-top: 30px; position: relative; height: 300px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .cup-part { border: 2px solid #333; border-top: none; position: relative; overflow: hidden; transition: height 0.5s, width 0.5s; background-color: rgba(255,255,255,0.8); }
        #top-part { border-top: 2px dashed #ccc; } /* 上層杯口 */
        
        .water { position: absolute; bottom: 0; left: 0; width: 100%; background-color: rgba(0, 191, 255, 0.7); transition: height 0.5s ease-in-out; }
        
        #results { margin-top: 20px; padding: 10px; border-top: 1px solid #ddd; }
        .highlight { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>APCS 裝飲料模擬器</h2>
    <div class="input-group">
        <label>下層 (w1, h1):</label>
        寬 <input type="number" id="w1" value="10"> cm, 高 <input type="number" id="h1" value="10"> cm
    </div>
    <div class="input-group">
        <label>上層 (w2, h2):</label>
        寬 <input type="number" id="w2" value="5"> cm, 高 <input type="number" id="h2" value="10"> cm
    </div>
    <div class="input-group">
        <label>倒入容量 (v):</label>
        <input type="text" id="volumes" value="100, 500, 200, 500" style="width: 200px;"> 
        <small>(以逗號分隔多次倒入量)</small>
    </div>
    <button onclick="simulate()">開始模擬</button>

    <div id="cup-container">
        <!-- 上層杯子 -->
        <div id="top-part" class="cup-part">
            <div id="water-top" class="water"></div>
        </div>
        <!-- 下層杯子 -->
        <div id="bottom-part" class="cup-part">
            <div id="water-bottom" class="water"></div>
        </div>
    </div>

    <div id="results">
        <p>當前水位：<span id="current-h">0</span> cm</p>
        <p>最大上升高度：<span id="max-rise" class="highlight">0</span> cm</p>
        <div id="log"></div>
    </div>
</div>

<script>
function simulate() {
    // 取得輸入值
    const w1 = parseInt(document.getElementById('w1').value);
    const h1 = parseInt(document.getElementById('h1').value);
    const w2 = parseInt(document.getElementById('w2').value);
    const h2 = parseInt(document.getElementById('h2').value);
    const vList = document.getElementById('volumes').value.split(',').map(v => parseInt(v.trim()));

    // 比例縮放 (顯示用)
    const scale = 10;
    const bottomPart = document.getElementById('bottom-part');
    const topPart = document.getElementById('top-part');
    
    bottomPart.style.width = (w1 * scale) + 'px';
    bottomPart.style.height = (h1 * scale) + 'px';
    topPart.style.width = (w2 * scale) + 'px';
    topPart.style.height = (h2 * scale) + 'px';

    let currentTotalVolume = 0;
    let currentHeight = 0;
    let maxRise = 0;
    let logHtml = "<strong>倒入紀錄：</strong><br>";

    const maxVolume = (w1 * w1 * h1) + (w2 * w2 * h2);

    vList.forEach((v, index) => {
        const oldHeight = currentHeight;
        currentTotalVolume += v;
        
        // 超過上限處理
        if (currentTotalVolume > maxVolume) currentTotalVolume = maxVolume;

        // 計算新高度
        let newHeight = 0;
        const bottomMaxV = w1 * w1 * h1;
        
        if (currentTotalVolume <= bottomMaxV) {
            newHeight = currentTotalVolume / (w1 * w1);
        } else {
            newHeight = h1 + (currentTotalVolume - bottomMaxV) / (w2 * w2);
        }

        const rise = newHeight - oldHeight;
        if (rise > maxRise) maxRise = rise;
        currentHeight = newHeight;

        logHtml += `第 ${index+1} 次倒入 ${v} cm³: 上升 ${rise.toFixed(1)} cm (總高 ${newHeight.toFixed(1)} cm)<br>`;
    });

    // 更新介面
    document.getElementById('max-rise').innerText = maxRise;
    document.getElementById('current-h').innerText = currentHeight.toFixed(1);
    document.getElementById('log').innerHTML = logHtml;

    // 水位動畫
    const waterBottom = document.getElementById('water-bottom');
    const waterTop = document.getElementById('water-top');

    if (currentHeight <= h1) {
        waterBottom.style.height = (currentHeight * scale) + 'px';
        waterTop.style.height = '0px';
    } else {
        waterBottom.style.height = '100%';
        waterTop.style.height = ((currentHeight - h1) * scale) + 'px';
    }
}

// 初始化
simulate();
</script>
</body>
</html>
